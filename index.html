<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dickson's Brochure</title>
  <style>
    :root{--accent:#0a74da}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,Helvetica,sans-serif;color:#111}
    header{padding:1rem;background:var(--accent);color:#fff}
    header h1{margin:0;font-size:1.25rem}
    .controls{display:flex;gap:.75rem;padding:.5rem 1rem;background:#f3f4f6;align-items:center}
    .controls a,.controls button{background:#fff;border:1px solid #ddd;padding:.5rem .75rem;border-radius:6px;text-decoration:none;color:inherit;cursor:pointer}
    .pdf-container{height:calc(100vh - 116px)}
    .pdf-frame{width:100%;height:100%;border:0}
    .notice{padding:1rem;background:#fff8c4;border-top:1px solid #f0e8a8}
  </style>
</head>
<body>
  <header>
    <h1>Dickson's Brochure</h1>
  </header>

  <div class="controls">
    <a href="brochure.pdf" download>Download PDF</a>
    <button onclick="openFullscreen()">Open PDF Fullscreen</button>
    <div style="margin-left:auto;font-size:.9rem;color:#666">Hosted in this repository: /brochure.pdf</div>
  </div>

  <div class="pdf-container">
    <!-- Try to display the PDF using <object>. Browsers that don't support inline PDFs will show the fallback link. -->
    <object class="pdf-frame" data="brochure.pdf" type="application/pdf">
      <p class="notice">Your browser does not support viewing PDFs inline. You can <a href="brochure.pdf">download the brochure</a> instead.</p>
    </object>
  </div>

  <script>
    function openFullscreen(){
      const el = document.querySelector('.pdf-frame');
      if (!el) return;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }
  </script>
</body>
</html>
